modLoader = "javafml"
loaderVersion = "*"
license = "MIT"
issueTrackerURL = "https://github.com/TeamMangoMilk/CorpseExtended/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "Corpse Extended"
authors = "TeamMangoMilk"
credits = "henkelmax (original Corpse mod)"
description = '''
Extends the Corpse mod with additional configuration options and features.
Requires the Corpse mod to be installed.
'''

[[dependencies.corpse_extended]]
    modId = "neoforge"
    type = "required"
    versionRange = "[${neoforge_version},)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.corpse_extended]]
    modId = "minecraft"
    type = "required"
    versionRange = "[1.21,1.21.2)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.corpse_extended]]
    modId = "corpse"
    type = "required"
    versionRange = "[${corpse_version},)"
    ordering = "AFTER"
    side = "BOTH"
